

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión — Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e, #283593);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-login {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }

        .card-header-login {
            background: #1a237e;
            color: white;
            border-radius: 16px 16px 0 0 !important;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>

<body>

    <div class="card card-login">
        <div class="card-header-login">
            <h2 class="mb-1">🎓 Sistema Escolar</h2>
            <p class="mb-0 opacity-75">Inicia sesión para continuar</p>
        </div>
        <div class="card-body p-4">

            {% if form.errors %}
            <div class="alert alert-danger">
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Usuario</label>
                    <input type="text" name="username" id="username" class="form-control form-control-lg"
                        placeholder="Tu nombre de usuario" autofocus required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" name="password" id="password" class="form-control form-control-lg"
                        placeholder="Tu contraseña" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Ingresar al sistema
                    </button>
                </div>

                <div class="text-center mt-3">
                    <a href="{% url 'usuarios:registro' %}" class="text-dark small">
                        ¿No tienes cuenta? Regístrate aquí
                    </a>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
